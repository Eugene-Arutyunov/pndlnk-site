<script>
(function () {
  var dataEl = document.getElementById("ksc-course-requests-data");
  var counterEl = document.getElementById("ksc-course-requests-counter");
  var quoteEl = document.getElementById("ksc-course-requests-quote");
  var btn = document.getElementById("ksc-course-requests-next");
  if (!dataEl || !counterEl || !quoteEl || !btn) return;
  var quotes = JSON.parse(dataEl.textContent);
  var n = quotes.length;
  var i = Math.floor(Math.random() * n);
  function show() {
    counterEl.textContent = "Запрос " + (i + 1) + " из " + n;
    quoteEl.textContent = quotes[i];
  }
  show();
  btn.addEventListener("click", function () {
    i = (i + 1) % n;
    show();
  });
})();
</script>
